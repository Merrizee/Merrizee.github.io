<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
        }
        #sidebar {
            width: 25%;
            padding: 20px;
            border-right: 1px solid #ddd;
            height: 100vh;
            overflow-y: auto;
        }
        #content {
            width: 75%;
            padding: 20px;
            overflow-y: auto;
        }
        a {
            text-decoration: none;
            color: #333;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>文章列表</h2>
        <!-- 在此处添加Markdown文件链接 -->
        <a href="path-to-your-markdown-file1.html">文章标题1</a><br>
        <a href="path-to-your-markdown-file2.html">文章标题2</a><br>
        <!-- ... -->
    </div>
    <div id="content">
        <h1>欢迎来到我的博客</h1>
        <p>这里是博客的介绍或主要内容。</p>
    </div>
    <script src="path-to-your-markdown-parser.js"></script>
    <script>
        // 使用上述Markdown解析器来渲染Markdown文件内容到#content
    </script>
</body>
</html>
