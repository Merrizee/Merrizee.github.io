<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2a4a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1b35;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Outer hexagon - deep navy gradient -->
  <polygon points="100,6 183,51 183,149 100,194 17,149 17,51"
           fill="url(#hexGrad)"/>

  <!-- Inner hexagon accent border - orange -->
  <polygon points="100,20 169,60 169,140 100,180 31,140 31,60"
           fill="none" stroke="#D97757" stroke-width="2.5" opacity="0.85"/>

  <!-- M letterform via polyline -->
  <polyline points="50,148 50,57 100,108 150,57 150,148"
            stroke="#FFFFFF" stroke-width="13.5" fill="none"
            stroke-linejoin="round" stroke-linecap="round"
            filter="url(#glow)"/>

  <!-- Orange vertex accent dots -->
  <circle cx="100" cy="6"   r="5.5" fill="#D97757"/>
  <circle cx="183" cy="51"  r="5.5" fill="#D97757"/>
  <circle cx="183" cy="149" r="5.5" fill="#D97757"/>
  <circle cx="100" cy="194" r="5.5" fill="#D97757"/>
  <circle cx="17"  cy="149" r="5.5" fill="#D97757"/>
  <circle cx="17"  cy="51"  r="5.5" fill="#D97757"/>

  <!-- Bottom accent underline -->
  <rect x="66" y="157" width="68" height="2.5" rx="1.25" fill="#D97757" opacity="0.7"/>
</svg>
